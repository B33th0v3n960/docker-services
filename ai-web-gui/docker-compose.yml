services:
  open-webui:
    build: .
    container_name: open-webui
    ports:
      - "3000:8080"
    volumes:
      - open-webui:/app/backend/data
    environment:
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
    extra_hosts:
      - "host.docker.internal:host-gateway"  # Required on Linux (incl. Raspberry Pi OS)
    restart: unless-stopped

volumes:
  open-webui:
